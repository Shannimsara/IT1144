    <div class="home-main">
        <div class="logo">
            <img src="logo.jpg" width="50px" height="50px">
        </div>
        <div class="text-logo"> 
            <h3>the city bookshop</h3>
        </div>
        <nav class="head">
            <ul class="ul-list">
                <li class="list1" ><a class="text" href="home.html"> Home</a></li>

    <div class="contact-main">
        <div class="contact-part1">
            <h2 style="margin-bottom: 10px; ">Get In Touch</h2>
            <p style="margin-bottom: 20px; ">Have a book request or an inquiry about our events? Drop us a line below.</p>
            <form >
                 <div class="form-group">
                    <label for="name">Name</label><br>
                    <input type="text" id="name" placeholder="Your Full Name" required>
                </div><br>
                <div class="form-group">
                    <label for="email">Email Address</label><br>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div><br>
                <div class="form-group">
                    <label for="message">Book Request / Message</label><br>
                    <textarea id="message" rows="5" placeholder="Tell us what you're looking for..." required></textarea>
                </div><br><br>
                <button id="java-1" onclick="changeText()" type="submit" class="browse-btn">Send Request</button><br>
                <p style="padding:10px ; color: green;" id="java-2"></p>
            </form>
        </div>
        <div class="contact-part2">
            <h1>You have any question ?<br>Feel free to contact us..
            </h1>
        </div>
    </div>
