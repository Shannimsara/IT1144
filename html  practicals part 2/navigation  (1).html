<html>
    <head><title>Navigation</title>
    <style>
  
  ul{
    list-style: none;
    padding: 0;
    margin: 0;
    overflow: hidden;
    background-color: rgb(13, 12, 12);
    display: flex;
    justify-content: center;
}

ul li a{
    text-decoration: none;
    display: block;
    color: rgb(247, 247, 241);
    text-align: center;
    padding: 10px;


}
ul li{
  
    display: inline;
    margin-right: 30px;
    float: left;
}
ul li a:hover{
    
    background-color: rgb(240, 16, 162);
}
.container{
    background-color: rgb(14, 14, 14);
    border: 2px solid red ;
    padding: 20px;
    display: flex;
    justify-content: space-between;
}
.item {
    background-color: rgb(200, 182, 201);
    padding: 15px 25px;
    border: 2px solid grey;
    margin: 5px;

}
    </style>
    </head>
    
    <body>
        <center><h1>My website</h1></center> 
        <nav>
        <ul >
            <li><a href="002.html">Home</a></li>
            <li><a href="#">about </a></li>
            <li><a href="#">contact</a></li>
            <li><a href="#">service</a></li>
        </ul>
        </nav><br><br>
       <div>
            <div class="container">
                <div class="item">item 1</div>
                <div class="item">item 2</div>
                <div class="item">item 3</div>
                <div class="item">item 4</div>
        </div>

    </body>
</html>
